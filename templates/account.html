<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Account - Family Fashion</title>

    <meta name="robots" content="noindex, nofollow">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/account.css') }}">
</head>

<body>

    <div class="container">

        <h1>My Account</h1>

        <hr>

        <h3>Personal Details</h3>

        <p><strong>Name:</strong> {{ session['user_name'] }}</p>

        <p><strong>Email:</strong> {{ email }}</p>

        <hr>

        <div class="button-container">

            <a href="{{ url_for('settings') }}">
                <button class="action-btn">Settings</button>
            </a>

            <a href="{{ url_for('orders') }}">
                <button class="action-btn">My Orders</button>
            </a>

            <a href="{{ url_for('logout') }}">
                <button class="action-btn">Logout</button>
            </a>

            <br><br>

            <a href="{{ url_for('index') }}" class="home-btn">Back to Home</a>

        </div>

    </div>

</body>

</html>
