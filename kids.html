<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viweport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/jpeg" href="Images/icon.jpeg">
    <title>Family Fashion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
     <header>

         <div class="top-bar"></div>
     <img src="Images/newlogo.jpeg" alt="logo" class="logo">
  
       <div class="search-bar">
                   <input type="text" id="search-box" placeholder="Search products...">
                    <button onclick="searchProduct()">Search</button>
                </div>

        <div class="tabs">
            <a href="shop.html">Home</a>
            <a href="shop.html#contact-details">Contact</a>
            <a href="#" onclick="openProfile()">Profile</a>
            <div id="profileBox" class="popup">
                <button onclick="openLogin()">Login / Sign Up</button>

                <ul>
                    <li>Orders</li>
                    <li>Wishlist</li>
                    <li>Account</li>
                    <li>Settings</li>
                </ul>

                <button onclick="closeProfile()">Close</button>
            </div>



            <div id="loginBox" class="popupbox">
                <h3>Login</h3>

                <input type="email" placeholder="Email"><br><br>

                <input type="password" placeholder="Password"><br><br>

                <button>Login</button>


                <p>Don't have an account? Sign Up</p>

                <button onclick="openSignup()">Sign Up</button>

                <button onclick="closeLogin()">Close</button>
            </div>

            <div id="signupBox" class="popupbox">
                <h3>Sign Up</h3>

                <input type="text" placeholder="Full Name">
                <br><br>

                <input type="email" placeholder="Email">
                <br><br>

                <input type="password" placeholder="Password">
                <br><br>

                <input type="password" placeholder="Confirm Password">
                <br><br>

                <button>Create Account</button>

                <button onclick="closeSignup()">Close</button>
            </div>
    

             <div class="icon">

            <a href="wishlist.html">
        <i class="fa-solid fa-heart" style="color: rgb(115, 15, 15);"></i>
        <span id="wishlist-count">0</span>
    </a>

    <a href="cart.html">
        <i class="fa-solid fa-cart-arrow-down" style="color: rgb(115, 15, 15);"></i>
        <span id="cart-count">0</span>
    </a>
        </div>
            </div>

             <h1 class="h2">Kids Collection</h1>
            
            </header>
        
    <main>
        <div class="container">

            <a href="newborn.html">
                <figure>
                    <img src="Images/newborn.jpg" alt="new-born dress">
                    <figcaption>New Born</figcaption>
                </figure>
            </a>

            <a href="babygirl.html">
                <figure>
                    <img src="Images/2.jpg" alt="girl-baby dress">
                    <figcaption>Baby Girl</figcaption>
                </figure>
            </a>

            <a href="babyboy.html">
                <figure>
                    <img src="Images/boy baby.jpeg" alt="boy-baby dress">
                    <figcaption>Baby Boy</figcaption>
                </figure>
            </a>

        </div>


<h2 class="line">From newborn essentials to trendy baby fashion, find the perfect outfits for every smile, cuddle, and adventure.</h2>

    </main>

    <script src="javascript.js"></script>
</body>

</html>
