<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<link rel="icon" type="image/jpeg" href="Images/ti.jpeg">
<title>Family Fashion</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>

        <div class="top-bar"></div>
        <img src="Images/newlogo.jpeg" alt="logo" class="logo">

        <div class="search-bar">
            <input type="text" id="search-box" placeholder="Search products...">
            <button onclick="searchProduct()">Search</button>
        </div>

        <div class="tabs">
            <a href="index.html">Home</a>
            <a href="index.html#contact-details">Contact</a>
            <a href="#" onclick="openProfile()">Profile</a>
            <div id="profileBox" class="popup">
                <button onclick="openLogin()">Login / Sign Up</button>

                <ul>
                    <li>Orders</li>
                    <li>Wishlist</li>
                    <li>Account</li>
                    <li>Settings</li>
                </ul>

                <button onclick="closeProfile()">Close</button>
            </div>

            <div id="loginBox" class="popupbox">
                <h3>Login</h3>

                <input type="email" placeholder="Email"><br><br>

                <input type="password" placeholder="Password"><br><br>

                <button>Login</button>


                <p>Don't have an account? Sign Up</p>

                <button onclick="openSignup()">Sign Up</button>

                <button onclick="closeLogin()">Close</button>
            </div>

            <div id="signupBox" class="popupbox">
                <h3>Sign Up</h3>

                <input type="text" placeholder="Full Name">
                <br><br>

                <input type="email" placeholder="Email">
                <br><br>

                <input type="password" placeholder="Password">
                <br><br>

                <input type="password" placeholder="Confirm Password">
                <br><br>

                <button>Create Account</button>

                <button onclick="closeSignup()">Close</button>
            </div>


            <div class="icon">

                <a href="wishlist.html">
                    <i class="fa-solid fa-heart" style="color: rgb(115, 15, 15);"></i>
                    <span id="wishlist-count">0</span>
                </a>

                <a href="cart.html">
                    <i class="fa-solid fa-cart-arrow-down" style="color: rgb(115, 15, 15);"></i>
                    <span id="cart-count">0</span>
                </a>
            </div>
        </div>

        <h1 class="h1"> Curated Collections Just For You - Shop By Category</h1>

    </header>

    <main>

        <div class="container">
            <a href="kids.html">
                <figure>
                    <img src="Images/Kids.jpeg" alt="kids">
                    <figcaption>Kids</figcaption>
                </figure>
            </a>
            <a href="women.html">
                <figure>
                    <img src="Images/women.jpg" alt="women">
                    <figcaption>Women</figcaption>
                </figure>
            </a>
            <a href="men.html">
                <figure>
                    <img src="Images/men.jpg" alt="men">
                    <figcaption>Men</figcaption>
                </figure>
            </a>
            <a href="accessories.html">
                <figure>
                    <img src="Images/accessories.jpeg" alt="accessories">
                    <figcaption>Accessories</figcaption>
                </figure>
            </a>
        </div>

        <div>


        </div>


        <div class="sale-banner">
            <h1>FLAT 50% OFF</h1>
            <h2>Fashion for Men, Women, Kids & Accessories</h2>
            <a href="sale.html">
                <button>Grab Your Favorites Now!</button>
            </a>
        </div>


    </main>

    <script src="javascript.js"></script>
</body>

</html>
